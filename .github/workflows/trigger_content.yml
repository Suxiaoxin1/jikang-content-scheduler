name: 吉康公众号内容定时生成

on:
  schedule:
    - cron: '0 0 * * 1'
    - cron: '0 0 * * 3'
    - cron: '0 0 * * 5'
  workflow_dispatch:
    inputs:
      topic:
        description: '内容主题'
        required: true
        default: '污泥低温干化技术进展'
      content_type:
        description: '内容类型(事件/技术/政策)'
        required: true
        default: '技术'
      keywords:
        description: '搜索关键词'
        required: true
        default: '污泥干化 热泵 节能'

jobs:
  trigger-dify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 读取当日计划
        id: plan
        run: |
          DAY=$(date +%A)
          python3 << 'PYEOF'
          import json
          with open('schedule.json') as f:
              data = json.load(f)
          day = '${{ env.DAY }}'
          for item in data['weekly_schedule']:
              if item['day'] == day:
                  print(f"topic={item['topic']}")
                  print(f"content_type={item['content_type']}")
                  print(f"keywords={item['keywords']}")
                  break
          PYEOF
        env:
          DAY: ${{ github.event.inputs.topic && 'Manual' || steps.plan.outputs.day }}

      - name: 触发Dify工作流
        run: |
          TOPIC="${{ github.event.inputs.topic || '污泥低温干化技术进展' }}"
          CONTENT_TYPE="${{ github.event.inputs.content_type || '技术' }}"
          KEYWORDS="${{ github.event.inputs.keywords || '污泥干化 热泵 节能' }}"
          PUBLISH_DATE=$(date -d '+3 days' +%Y-%m-%d 2>/dev/null || date -v+3d +%Y-%m-%d)
          
          echo "主题: $TOPIC"
          echo "类型: $CONTENT_TYPE"
          
          # 使用 Python 发送请求，避免 shell 转义问题
          python3 << 'PYEOF'
          import urllib.request
          import json
          import os
          
          url = "${{ secrets.DIFY_BASE_URL }}/v1/workflows/run"
          headers = {
              "Authorization": "Bearer ${{ secrets.DIFY_API_KEY }}",
              "Content-Type": "application/json"
          }
          data = {
              "inputs": {
                  "topic": os.environ.get("TOPIC"),
                  "content_type": os.environ.get("CONTENT_TYPE"),
                  "keywords": os.environ.get("KEYWORDS"),
                  "publish_date": os.environ.get("PUBLISH_DATE")
              },
              "response_mode": "blocking",
              "user": "github-actions"
          }
          
          req = urllib.request.Request(url, json.dumps(data).encode(), headers, method="POST")
          try:
              with urllib.request.urlopen(req) as response:
                  print(response.read().decode())
                  print("✅ 触发成功")
          except Exception as e:
              print(f"❌ 错误: {e}")
              exit(1)
          PYEOF
        env:
          TOPIC: ${{ github.event.inputs.topic }}
          CONTENT_TYPE: ${{ github.event.inputs.content_type }}
          KEYWORDS: ${{ github.event.inputs.keywords }}
          PUBLISH_DATE: ${{ steps.plan.outputs.publish_date }}
