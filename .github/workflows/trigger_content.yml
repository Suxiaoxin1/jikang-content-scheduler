name: 吉康公众号内容定时生成

on:
  schedule:
    - cron: '0 0 * * 1'
    - cron: '0 0 * * 3'
    - cron: '0 0 * * 5'
  workflow_dispatch:
    inputs:
      topic:
        description: '内容主题'
        required: true
        default: '污泥低温干化技术进展'
      content_type:
        description: '内容类型(事件/技术/政策)'
        required: true
        default: '技术'
      keywords:
        description: '搜索关键词'
        required: true
        default: '污泥干化 热泵 节能'
      publish_date:
        description: '计划发布日期(YYYY-MM-DD)'
        required: false

jobs:
  trigger-dify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 触发Dify工作流
        env:
          DIFY_API_KEY: ${{ secrets.DIFY_API_KEY }}
          DIFY_BASE_URL: ${{ secrets.DIFY_BASE_URL }}
          INPUT_TOPIC: ${{ github.event.inputs.topic }}
          INPUT_CONTENT_TYPE: ${{ github.event.inputs.content_type }}
          INPUT_KEYWORDS: ${{ github.event.inputs.keywords }}
          INPUT_PUBLISH_DATE: ${{ github.event.inputs.publish_date }}
        run: python3 trigger.py
